name: Deploy to WordPress.org
on:
  release:
    types: [released]
jobs:
  deploy:
    name: Deploy to WP.org
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare release
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          echo "Preparing release $VERSION"

          # Compile changelog entries
          if [ -d ".github/changelog/unreleased" ] && [ -n "$(ls -A .github/changelog/unreleased 2>/dev/null)" ]; then
            bash bin/changelog-write.sh "$VERSION"
          else
            echo "No unreleased changelog entries found, skipping changelog compilation"
          fi

          # Bump version numbers
          bash bin/version-bump.sh "$VERSION"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: friends

      - name: Create version bump PR
        env:
          VERSION: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="release/$VERSION"
          git checkout -b "$BRANCH"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Version bump + Changelog for $VERSION"
            git push origin "$BRANCH"
            gh pr create \
              --title "Version bump + Changelog for $VERSION" \
              --body "Automated version bump and changelog update from release $VERSION." \
              --base main \
              --head "$BRANCH" \
              --label "Skip Changelog"
          fi
